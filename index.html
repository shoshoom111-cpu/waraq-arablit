<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>وَرَق | مجلة مركز الأدب العربي</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-0VWPRXW7P9"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-0VWPRXW7P9');
</script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Arabic:wght@400;500;700&family=Cairo:wght@300;400;500;600&family=Felfel&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#1A7A7A;--td:#0f5555;--tl:#E8F5F2;--orange:#C94B1E;--ol:#FDF0EC;--gold:#D4A843;--gd:#3D2800;--ink:#0E0E0E;--paper:#FAF9F7;--cream:#F4F2EE;--mid:#6B6860;--light:#C8C5BC;--border:#E2DFD8;}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
body{font-family:'Cairo',sans-serif;background:var(--paper);color:var(--ink);direction:rtl;line-height:1.6;overflow-x:hidden;}
button,a{cursor:pointer;}
.view{display:none;} .view.active{display:block;} 
.topbar{background:var(--ink);padding:6px 0;}
.topbar-in{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;}
.topbar-text{font-size:11px;color:#888;}
.tb-links{display:flex;gap:16px;}
.tb-links a{font-size:11px;color:#888;text-decoration:none;}
.tb-links a:hover{color:var(--gold);}
.site-header{background:var(--paper);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;}
.header-in{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:60px;}
.header-logo{font-family:'Felfel',serif;font-size:32px;color:var(--ink);cursor:pointer;text-decoration:none;}
.header-logo:hover{color:var(--teal);}
.header-nav{display:flex;align-items:center;gap:2px;}
.nav-a{font-size:12px;color:var(--mid);text-decoration:none;padding:6px 14px;border-radius:6px;cursor:pointer;}
.nav-a:hover,.nav-a.on{color:var(--teal);background:var(--tl);}
.header-actions{display:flex;align-items:center;gap:8px;}
.btn-ghost{font-size:11px;color:var(--mid);text-decoration:none;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:'Cairo',sans-serif;}
.btn-ghost:hover{border-color:var(--teal);color:var(--teal);}
.btn-primary{font-size:11px;color:#fff;background:var(--teal);padding:7px 16px;border-radius:6px;border:none;font-family:'Cairo',sans-serif;font-weight:500;}
.btn-primary:hover{background:var(--td);}
.ham-btn{display:none;background:none;border:none;flex-direction:column;gap:5px;padding:4px;}
.ham-btn span{display:block;width:22px;height:2px;background:var(--ink);border-radius:2px;transition:all .3s;}
.ham-btn.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
.ham-btn.open span:nth-child(2){opacity:0;}
.ham-btn.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
.mob-menu{background:var(--paper);border-bottom:1px solid var(--border);padding:12px 24px 20px;}
.mob-menu a{display:block;font-size:14px;color:var(--ink);padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.mob-menu a:hover{color:var(--teal);}
.mob-actions{display:flex;gap:8px;margin-top:14px;}
.mob-actions .btn-ghost,.mob-actions .btn-primary{flex:1;text-align:center;padding:10px;}
.masthead{border-bottom:3px solid var(--orange);padding:18px 24px 14px;}
.mh-in{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;}
.mh-left,.mh-right{font-size:11px;color:var(--mid);line-height:2;}
.mh-right{text-align:left;}
.mh-name{font-family:'Felfel',serif;font-size:64px;color:var(--ink);cursor:pointer;line-height:1;text-align:center;}
.mh-tag{font-size:11px;color:var(--teal);letter-spacing:.1em;margin-top:5px;text-align:center;}
.ticker{background:var(--teal);overflow:hidden;padding:6px 0;}
.ticker-track{display:flex;gap:56px;animation:roll 36s linear infinite;white-space:nowrap;}
.ticker:hover .ticker-track{animation-play-state:paused;}
.ticker-track span{font-size:11px;color:#fff;cursor:pointer;}
.ticker-track span::before{content:"◄ ";color:var(--gold);font-size:9px;}
@keyframes roll{from{transform:translateX(-50%)}to{transform:translateX(0)}}
.hero-section{max-width:1200px;margin:0 auto;padding:32px 24px 0;}
.hero-grid{display:grid;grid-template-columns:1fr 320px;gap:0;border-bottom:1px solid var(--border);}
.hero-main{padding-bottom:32px;padding-left:28px;border-left:1px solid var(--border);}
.hero-side{padding-bottom:32px;}
.tag{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.1em;color:#fff;padding:3px 10px;border-radius:2px;}
.hero-title{font-family:'Noto Serif Arabic',serif;font-size:32px;line-height:1.35;color:var(--ink);margin-bottom:12px;cursor:pointer;}
.hero-title:hover{color:var(--teal);}
.hero-rule{width:40px;height:3px;background:var(--orange);margin-bottom:14px;}
.hero-body{font-size:14px;color:var(--mid);line-height:1.9;}
.hero-byline{font-size:11px;color:var(--teal);margin-top:10px;}
.hero-cta{display:inline-block;margin-top:16px;font-size:11px;color:var(--teal);border-bottom:1px solid var(--teal);cursor:pointer;}
.hero-cta:hover{color:var(--orange);border-color:var(--orange);}
.side-hd{font-size:11px;font-weight:600;letter-spacing:.1em;color:var(--mid);border-bottom:1px solid var(--border);padding:0 20px 10px;}
.side-item{padding:12px 20px;border-bottom:1px solid var(--border);cursor:pointer;}
.side-item:hover{background:var(--cream);}
.si-badge{font-size:9px;letter-spacing:.06em;color:var(--mid);margin-bottom:3px;}
.si-title{font-size:13px;font-weight:500;line-height:1.4;}
.si-meta{font-size:11px;color:var(--light);margin-top:2px;}
.quote-card{margin:16px 20px 0;border-right:3px solid var(--gold);padding:12px 14px;background:#FFFDF0;}
.quote-text{font-family:'Noto Serif Arabic',serif;font-size:13px;line-height:1.75;color:var(--gd);}
.quote-attr{font-size:10px;color:var(--gold);margin-top:6px;}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px;}
.sec-header{display:flex;align-items:center;justify-content:space-between;border-top:2px solid var(--ink);padding-top:18px;margin-top:32px;margin-bottom:18px;}
.sec-title{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--ink);}
.sec-more{font-size:11px;color:var(--teal);cursor:pointer;}
.books-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
.book-card{background:var(--paper);cursor:pointer;overflow:hidden;}
.book-card:hover{background:var(--cream);}
.book-card:hover .book-title{color:var(--teal);}
.book-card-img{width:100%;height:180px;object-fit:cover;display:block;}
.book-card-strip{height:6px;display:block;}
.book-card-body{padding:14px 16px 16px;}
.book-genre{font-size:9px;letter-spacing:.08em;color:var(--mid);margin-bottom:5px;font-weight:600;}
.book-title{font-family:'Noto Serif Arabic',serif;font-size:17px;line-height:1.35;margin-bottom:4px;}
.book-author{font-size:11px;color:var(--orange);margin-bottom:6px;}
.book-stars{font-size:12px;color:var(--gold);}
.book-desc{font-size:12px;color:var(--mid);line-height:1.7;margin-top:6px;}
.book-cta{display:inline-block;margin-top:10px;font-size:11px;color:var(--teal);border-bottom:1px solid var(--teal);}
.arts-grid{display:grid;grid-template-columns:2fr 1fr;gap:24px;}
.art-item{display:grid;grid-template-columns:auto 1fr;gap:16px;padding:20px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.art-item.has-img{grid-template-columns:120px 1fr;}
.art-item-img{width:120px;height:90px;object-fit:cover;border-radius:6px;}
.art-item:hover .ai-title{color:var(--teal);}
.art-num{font-family:'Noto Serif Arabic',serif;font-size:36px;color:var(--border);line-height:1;font-weight:700;min-width:40px;}
.ai-badge{font-size:9px;letter-spacing:.08em;color:var(--mid);margin-bottom:6px;font-weight:600;}
.ai-title{font-family:'Noto Serif Arabic',serif;font-size:18px;line-height:1.45;margin-bottom:6px;}
.ai-excerpt{font-size:13px;color:var(--mid);line-height:1.75;}
.ai-meta{font-size:11px;color:var(--light);margin-top:8px;}
.art-side-item{padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;}
.art-side-item:hover .asi-title{color:var(--teal);}
.asi-badge{font-size:9px;letter-spacing:.06em;color:var(--mid);margin-bottom:5px;}
.asi-title{font-size:14px;font-weight:500;line-height:1.4;}
.asi-meta{font-size:11px;color:var(--light);margin-top:4px;}
.arch-strip{background:var(--cream);padding:32px 24px;margin-top:36px;}
.arch-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:18px;}
.arch-mini{border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .2s;}
.arch-mini:hover{transform:translateY(-4px);}
.arch-mini-cover{height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.arch-mini-name{font-family:'Felfel',serif;font-size:18px;color:#fff;}
.arch-mini-num{font-size:9px;color:rgba(255,255,255,.6);}
.arch-mini-info{background:#fff;padding:8px 10px;border:.5px solid var(--border);}
.arch-mini-date{font-size:10px;color:var(--mid);}
.arch-mini-dl{display:block;font-size:10px;color:var(--teal);margin-top:3px;text-decoration:none;}
.newsletter{padding:48px 24px;text-align:center;}
.nl-logo{font-family:'Felfel',serif;font-size:36px;color:rgba(255,255,255,.3);margin-bottom:14px;}
.nl-title{font-family:'Noto Serif Arabic',serif;font-size:26px;color:#fff;margin-bottom:8px;}
.nl-sub{font-size:13px;margin-bottom:22px;}
.nl-form{display:flex;gap:8px;max-width:400px;margin:0 auto;}
.nl-input{flex:1;padding:11px 14px;border:none;border-radius:6px;font-family:'Cairo',sans-serif;font-size:13px;direction:rtl;}
.nl-btn{padding:11px 20px;border:none;border-radius:6px;font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.footer{background:var(--ink);padding:40px 24px 16px;}
.ft{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:36px;padding-bottom:28px;border-bottom:.5px solid #1e1e1e;max-width:1200px;margin:0 auto;}
.ft-logo{font-family:'Felfel',serif;font-size:34px;color:#fff;cursor:pointer;}
.ft-logo:hover{color:var(--gold);}
.ft-tag{font-size:12px;color:#555;margin-top:6px;line-height:1.8;}
.ft-col h4{font-size:10px;color:#444;letter-spacing:.1em;margin-bottom:12px;}
.ft-col a{display:block;font-size:13px;color:#666;text-decoration:none;margin-bottom:7px;cursor:pointer;}
.ft-col a:hover{color:var(--gold);}
.ft-btm{max-width:1200px;margin:16px auto 0;display:flex;justify-content:space-between;align-items:center;}
.ft-copy{font-size:11px;color:#333;}
.ft-soc{font-size:11px;padding:4px 12px;border-radius:4px;color:#fff;text-decoration:none;}
.page-header{background:var(--ink);padding:32px 24px;}
.ph-in{max-width:1200px;margin:0 auto;}
.ph-back{font-size:12px;color:#888;cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif;display:inline-flex;align-items:center;gap:5px;margin-bottom:12px;padding:0;}
.ph-back:hover{color:#fff;}
.ph-title{font-family:'Noto Serif Arabic',serif;font-size:32px;color:#fff;margin-bottom:4px;}
.ph-sub{font-size:12px;color:#555;}
.books-page-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:1200px;margin:28px auto;padding:0 24px;}
.bpg-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;}
.bpg-card:hover{border-color:var(--teal);transform:translateY(-3px);}
.bpg-cover{height:160px;display:flex;align-items:center;justify-content:center;padding:20px;}
.bpg-cover span{font-family:'Noto Serif Arabic',serif;font-size:22px;color:#fff;text-align:center;}
.bpg-body{padding:16px;}
.bpg-badge{display:inline-block;font-size:9px;padding:2px 9px;border-radius:2px;color:#fff;margin-bottom:8px;}
.bpg-title{font-family:'Noto Serif Arabic',serif;font-size:19px;margin-bottom:4px;}
.bpg-author{font-size:12px;color:var(--orange);margin-bottom:8px;}
.bpg-stars{font-size:12px;color:var(--gold);margin-bottom:8px;}
.bpg-desc{font-size:12px;color:var(--mid);line-height:1.7;}
.bpg-btn{display:block;margin-top:12px;padding:8px;text-align:center;border:1px solid var(--border);border-radius:6px;font-size:12px;color:var(--teal);font-family:'Cairo',sans-serif;}
.bpg-btn:hover{background:var(--teal);color:#fff;border-color:var(--teal);}
.arts-page{max-width:1200px;margin:0 auto;padding:28px 24px;}
.apg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;}
.apg-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all .2s;overflow:hidden;}
.apg-card:hover{border-color:var(--teal);}
.apg-card:hover .apg-title{color:var(--teal);}
.apg-badge{display:inline-block;font-size:9px;padding:2px 9px;border-radius:20px;color:#fff;margin-bottom:10px;}
.apg-img{width:calc(100% + 40px);height:140px;object-fit:cover;margin:-20px -20px 14px;}
.apg-title{font-family:'Noto Serif Arabic',serif;font-size:18px;line-height:1.45;margin-bottom:8px;}
.apg-excerpt{font-size:13px;color:var(--mid);line-height:1.8;}
.apg-footer{display:flex;justify-content:space-between;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);}
.apg-author{font-size:11px;color:var(--teal);}
.apg-date{font-size:11px;color:var(--light);}
.arch-page{max-width:1200px;margin:0 auto;padding:28px 24px;}
.arch-pg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.arch-pg-card{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:transform .2s;}
.arch-pg-card:hover{transform:translateY(-3px);}
.arch-pg-cover{height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.arch-pg-logo{font-family:'Felfel',serif;font-size:36px;color:#fff;}
.arch-pg-num{font-size:11px;color:rgba(255,255,255,.6);}
.arch-pg-info{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.arch-pg-date{font-size:12px;color:var(--mid);}
.arch-pg-dl{font-size:12px;color:var(--teal);text-decoration:none;font-weight:500;}
.single-art-wrap{max-width:720px;margin:0 auto;padding:32px 24px 60px;}
.sa-badge{display:inline-block;color:#fff;font-size:10px;padding:3px 12px;margin-bottom:14px;border-radius:2px;}
.sa-title{font-family:'Noto Serif Arabic',serif;font-size:32px;line-height:1.35;margin-bottom:12px;}
.sa-meta{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid var(--border);}
.sa-author{font-size:13px;font-weight:500;}
.sa-date{font-size:12px;color:var(--light);}
.sa-cat{font-size:10px;padding:3px 10px;border-radius:20px;background:var(--tl);color:var(--teal);}
.sa-body{font-size:15px;line-height:2.1;color:#222;}
.sa-body p{margin-bottom:1.2em;}
.sa-body h2{font-family:'Noto Serif Arabic',serif;font-size:22px;margin:1.8em 0 .8em;}
.sa-quote{border-right:4px solid var(--orange);padding:12px 18px;margin:24px 0;background:var(--ol);}
.sa-quote p{font-family:'Noto Serif Arabic',serif;font-size:16px;line-height:1.75;color:var(--orange);}
.single-book-wrap{max-width:860px;margin:0 auto;padding:32px 24px 60px;}
.sb-in{display:grid;grid-template-columns:200px 1fr;gap:36px;align-items:start;}
.sb-cover{border-radius:10px;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;padding:16px;}
.sb-cover span{font-family:'Noto Serif Arabic',serif;font-size:22px;color:#fff;text-align:center;}
.sb-badge{display:inline-block;color:#fff;font-size:9px;padding:2px 10px;border-radius:2px;margin-bottom:8px;}
.sb-title{font-family:'Noto Serif Arabic',serif;font-size:32px;line-height:1.2;margin-bottom:8px;}
.sb-author{font-size:16px;color:var(--orange);margin-bottom:10px;}
.sb-stars{font-size:20px;color:var(--gold);margin-bottom:14px;}
.sb-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.sb-pill{font-size:11px;padding:3px 11px;border-radius:20px;background:var(--cream);color:var(--mid);border:1px solid var(--border);}
.sb-desc{font-size:14px;line-height:2;color:#333;margin-bottom:18px;}
.sb-quote{border-right:4px solid var(--gold);padding:10px 16px;margin:18px 0;background:#FFFDF0;}
.sb-quote p{font-family:'Noto Serif Arabic',serif;font-size:15px;color:var(--gd);}
.sb-buy{background:var(--teal);color:#fff;font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;padding:12px 28px;border-radius:8px;cursor:pointer;border:none;}
.related-sec{max-width:720px;margin:0 auto;padding:20px 24px 0;border-top:1px solid var(--border);}
.rel-label{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--mid);margin-bottom:12px;}
.rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.rel-card{padding:12px;border:1px solid var(--border);border-radius:8px;cursor:pointer;}
.rel-card:hover{border-color:var(--teal);background:var(--tl);}
.rel-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:4px;}
.rel-meta{font-size:11px;color:var(--light);}
.issue-hd{background:var(--ink);padding:20px 24px;}
.issue-hd-in{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.issue-pdf-wrap{background:#3a3a3a;min-height:80vh;display:flex;flex-direction:column;align-items:center;}
.pdf-placeholder{max-width:500px;margin:60px auto;text-align:center;padding:0 24px;}
.pdf-placeholder-icon{width:70px;height:90px;background:#4a4a4a;border-radius:6px;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;}
.pdf-frame-wrap{width:100%;max-width:900px;margin:0 auto;padding:20px 0 40px;}
@media(max-width:1024px){
  .hero-grid{grid-template-columns:1fr;}
  .hero-main{border-left:none;border-bottom:1px solid var(--border);padding-left:0;}
  .books-grid{grid-template-columns:repeat(2,1fr);}
  .arts-grid{grid-template-columns:1fr;}
  .arch-row{grid-template-columns:repeat(3,1fr);}
  .ft{grid-template-columns:1fr 1fr;}
  .books-page-grid{grid-template-columns:repeat(2,1fr);}
  .arch-pg-grid{grid-template-columns:repeat(2,1fr);}
  .sb-in{grid-template-columns:160px 1fr;}
  .mh-in{grid-template-columns:1fr;}
  .mh-left,.mh-right{display:none;}
  .mh-name{font-size:52px;}
}
@media(max-width:768px){
  .header-nav,.header-actions{display:none;}
  .ham-btn{display:flex;}
  .header-in{padding:0 16px;}
  .topbar-text{display:none;}
  .search-btn-text{display:none;}
  .mh-name{font-size:40px;}
  .hero-section,.wrap{padding-left:16px;padding-right:16px;}
  .books-grid{grid-template-columns:1fr 1fr;}
  .arch-row{grid-template-columns:repeat(2,1fr);}
  .nl-form{flex-direction:column;}
  .ft{grid-template-columns:1fr;}
  .ft-btm{flex-direction:column;gap:10px;text-align:center;}
  .apg-grid,.arch-pg-grid{grid-template-columns:1fr;}
  .sb-in{grid-template-columns:1fr;}
  .sb-cover{width:140px;margin:0 auto 20px;}
  .rel-grid{grid-template-columns:1fr;}
  .single-art-wrap,.single-book-wrap,.arts-page,.arch-page{padding-left:16px;padding-right:16px;}
  .books-page-grid{grid-template-columns:1fr 1fr;padding:0 16px;}
}
@media(max-width:480px){
  .mh-name{font-size:34px;}
  .books-grid,.books-page-grid{grid-template-columns:1fr;}
  .arch-row{grid-template-columns:repeat(2,1fr);}
}

/* BANNER */
.site-banner{width:100%;overflow:hidden;cursor:pointer;display:none;}
.site-banner img{width:100%;max-height:400px;object-fit:cover;display:block;}
/* LOGO IN HEADER */
.header-logo-img{height:40px;width:auto;object-fit:contain;}
.header-logo-wrap{display:flex;align-items:center;gap:10px;}
/* MONTH PICK */
.month-pick{background:var(--ink);color:#fff;padding:28px 24px;margin-top:32px;}
.mp-in{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center;}
